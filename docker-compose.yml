services:
  mongo:
    image: mongo:6.0
    container_name: ai-code-editor-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1024m
    cpus: 1.0

  redis:
    image: redis:7.2-alpine
    container_name: ai-code-editor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 512m
    cpus: 0.5

  backend:
    build:
      context: ./backend
    container_name: ai-code-editor-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/ai-code-editor
      - REDIS_URL=redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 1024m
    cpus: 1.0

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost
    container_name: ai-code-editor-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  gateway:
    image: nginx:1.25-alpine
    container_name: ai-code-editor-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.25

volumes:
  mongo_data:
  redis_data:
